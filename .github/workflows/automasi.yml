name: SoloFoundry Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.12'}
      - name: Run script
        env: {GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}}
        run: |
          pip install google-generativeai
          python main.py
      - name: Push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Cek file sebelum commit
          if ls produksi_*.md 1> /dev/null 2>&1; then
            git add produksi_*.md
            git commit -m "Auto: Update konten harian"
            git push
          else
            echo "Tidak ada file baru dibuat, proses dihentikan dengan aman."
          fi
