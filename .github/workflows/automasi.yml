name: Gemini Auto Factory
on:
  schedule:
    - cron: '0 8 * * *' # Jalan tiap jam 8 pagi
  workflow_dispatch:

jobs:
  run_machine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Jalankan Mesin Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
        
